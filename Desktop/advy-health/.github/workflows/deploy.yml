# ─────────────────────────────────────────────────────────────
# ADVY HEALTH — GitHub Actions: Deploy to Vercel
#
# SETUP (one time):
# 1. Go to vercel.com → sign up with your GitHub account
# 2. Click "Add New Project" → import your advy-health GitHub repo
# 3. Vercel auto-detects Create React App — just click Deploy
# 4. After first deploy, go to: vercel.com → your project → Settings → General
#    Copy your Project ID and Team ID (or personal account ID)
# 5. Go to vercel.com → Account Settings → Tokens → Create token
# 6. In GitHub repo → Settings → Secrets and variables → Actions, add:
#    VERCEL_TOKEN      → your Vercel token
#    VERCEL_ORG_ID     → your team/personal account ID
#    VERCEL_PROJECT_ID → your project ID
# ─────────────────────────────────────────────────────────────

name: Deploy Advy Health to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
